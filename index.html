<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #eef1f5;
  overflow-x: hidden; /* FIX 1: جلوگیری از تکون خوردن صفحه */
}

/* HEADER */
.header {
  padding: 24px 20px 10px;
  font-size: 32px;
  font-weight: 700;
}

/* SEARCH FIXED */
.search {
  margin: 0 20px 15px;
  display: flex;
  justify-content: center; /* FIX 2: وسط چین */
}

.search input {
  width: 85%; /* FIX 3: کوتاه‌تر شد */
  max-width: 420px;
  padding: 14px;
  border-radius: 14px;
  border: none;
  background: #e5e7eb;
  font-size: 14px;
}

/* SECTION */
.section {
  margin: 0 20px 20px;
}

.section-title {
  font-size: 13px;
  font-weight: 600;
  color: #7a7a7a;
  margin-bottom: 8px;
}

/* BOX */
.box {
  background: white;
  border-radius: 18px;
  overflow: hidden;
}

/* ROW */
.row {
  padding: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.row:not(:last-child) {
  border-bottom: 1px solid #eee;
}

.count {
  color: #999;
}

/* ADD BUTTON */
.add-btn {
  position: fixed;
  right: 22px;
  bottom: 90px;
  width: 56px;
  height: 56px;
  background: #1d4ed8;
  color: white;
  border-radius: 50%;
  font-size: 30px;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* TAB BAR */
.tabbar {
  position: fixed;
  bottom: 20px;
  left: 20px;
  right: 20px;
  height: 70px;
  background: white;
  border-radius: 22px;
  display: flex;
  justify-content: space-around;
  align-items: center;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.tab {
  text-align: center;
  font-size: 11px;
  color: #777;
}

.tab svg {
  display: block;
  margin: 0 auto 4px;
}

.tab.active {
  color: #1d4ed8;
}
</style>
</head>

<body>

<div class="header">My Vault</div>

<div class="search">
  <input id="searchInput" placeholder="Search..." oninput="render()">
</div>

<div class="section">
  <div class="section-title">
    Folders (<span id="folderCount">0</span>)
  </div>
  <div class="box" id="folders"></div>
</div>

<div class="add-btn" onclick="addFolder()">+</div>

<div class="tabbar">
  <div class="tab active">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="7" width="16" height="12" rx="2"/>
      <circle cx="12" cy="13" r="2"/>
    </svg>
    Vault
  </div>

  <div class="tab">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 3v16M7 8l5-5 5 5M7 16l5 3 5-3"/>
    </svg>
    Tree
  </div>

  <div class="tab">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M4 12h16M12 4v16"/>
    </svg>
    Generator
  </div>

  <div class="tab">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19 12a7 7 0 0 0-.1-1l2-1-2-3-2 1a7 7 0 0 0-2-1l-.3-2h-4l-.3 2a7 7 0 0 0-2 1l-2-1-2 3 2 1a7 7 0 0 0 0 2l-2 1 2 3 2-1a7 7 0 0 0 2 1l.3 2h4l.3-2a7 7 0 0 0 2-1l2 1 2-3-2-1c.1-.3.1-.7.1-1z"/>
    </svg>
    Settings
  </div>
</div>

<script>
let folders = JSON.parse(localStorage.getItem("folders")) || [];
let dataStore = JSON.parse(localStorage.getItem("dataStore")) || {};

function render() {
  let search = document.getElementById("searchInput").value.toLowerCase();
  let folderBox = document.getElementById("folders");

  folderBox.innerHTML = "";

  let filtered = folders.filter(f => f.toLowerCase().includes(search));

  document.getElementById("folderCount").innerText = filtered.length;

  filtered.forEach(name => {
    let count = (dataStore[name] || []).length;

    let row = document.createElement("div");
    row.className = "row";
    row.onclick = () => openFolder(name);

    row.innerHTML = `
      <span>${name}</span>
      <span class="count">${count}</span>
    `;

    folderBox.appendChild(row);
  });

  localStorage.setItem("folders", JSON.stringify(folders));
  localStorage.setItem("dataStore", JSON.stringify(dataStore));
}

function addFolder() {
  let name = prompt("Folder name:");
  if (name) {
    folders.push(name);
    dataStore[name] = [];
    render();
  }
}

function openFolder(name) {
  let username = prompt("Username:");
  let password = prompt("Password:");

  if (!dataStore[name]) dataStore[name] = [];

  dataStore[name].push({ username, password });

  render();
}

render();
</script>

</body>
</html>
