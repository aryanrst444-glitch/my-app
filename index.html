<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Vault</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont;
  background: #f2f4f7;
  margin: 0;
  overflow-x: hidden; /* FIX SCROLL */
}

.container {
  padding: 20px;
}

h1 {
  margin-bottom: 15px;
}

/* SEARCH BAR */
.search-box {
  display: flex;
  align-items: center;
  background: white;
  border-radius: 12px;
  padding: 0 12px;
  margin-bottom: 20px;
  width: 85%;
}

.search-box span {
  font-size: 18px;
}

.search {
  border: none;
  outline: none;
  padding: 12px;
  font-size: 16px;
  flex: 1;
}

/* SECTIONS */
.section {
  margin-bottom: 20px;
}

/* CARD */
.card {
  background: white;
  border-radius: 16px;
  padding: 15px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  cursor: pointer;
}

/* ADD BUTTON */
.add-btn {
  position: fixed;
  bottom: 110px;
  right: 20px;
  background: #007aff;
  color: white;
  border-radius: 50%;
  width: 65px;
  height: 65px;
  font-size: 34px;
  border: none;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* TAB BAR */
.tabbar {
  position: fixed;
  bottom: 15px;
  width: 90%;
  left: 5%;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(20px);
  display: flex;
  justify-content: space-around;
  padding: 12px 0;
  border-radius: 22px;
  border: 1px solid #ddd;
}

.tab {
  font-size: 12px;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">
  <h1>My Vault</h1>

  <!-- SEARCH -->
  <div class="search-box">
    <span>🔍</span>
    <input class="search" id="search" placeholder="Search" oninput="render()">
  </div>

  <!-- Folder Section -->
  <div class="section">
    <h3>Folders</h3>
    <div id="folders"></div>
  </div>

  <!-- No Folder -->
  <div class="section">
    <h3>No Folder</h3>
    <div id="noFolder">(Empty)</div>
  </div>
</div>

<button class="add-btn" onclick="addFolder()">+</button>

<div class="tabbar">
  <div class="tab">My vault</div>
  <div class="tab">Tree</div>
  <div class="tab">Generator</div>
  <div class="tab">Settings</div>
</div>

<script>
let folders = JSON.parse(localStorage.getItem("folders")) || [];

function render() {
  let container = document.getElementById("folders");
  let searchValue = document.getElementById("search").value.toLowerCase();

  container.innerHTML = "";

  let filtered = folders
    .map((f, i) => ({name: f, index: i}))
    .filter(f => f.name.toLowerCase().includes(searchValue))
    .sort((a, b) => a.name.indexOf(searchValue) - b.name.indexOf(searchValue));

  filtered.forEach(f => {
    let div = document.createElement("div");
    div.className = "card";
    div.onclick = () => openFolder(f.name);

    div.innerHTML = `
      ${f.name}
      <button onclick="event.stopPropagation();deleteFolder(${f.index})">❌</button>
    `;

    container.appendChild(div);
  });

  localStorage.setItem("folders", JSON.stringify(folders));
}

function addFolder() {
  let name = prompt("Folder name:");
  if (name) {
    folders.push(name);
    render();
  }
}

function deleteFolder(i) {
  folders.splice(i, 1);
  render();
}

/* OPEN FOLDER (NEW FEATURE) */
function openFolder(name) {
  let data = JSON.parse(localStorage.getItem(name)) || [];

  let username = prompt("Username:");
  let password = prompt("Password:");
  let note = prompt("Note:");
  let key = prompt("Key Phrase:");

  data.push({username, password, note, key});

  localStorage.setItem(name, JSON.stringify(data));

  alert("Saved inside " + name);
}

render();
</script>

</body>
</html>
