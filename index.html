<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Vault</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont;
  background: #f2f4f7;
  margin: 0;
  overflow-x: hidden;
}

.container {
  padding: 20px;
}

h1 {
  margin-bottom: 15px;
}

/* SEARCH */
.search-box {
  display: flex;
  align-items: center;
  background: white;
  border-radius: 14px;
  padding: 10px 14px;
  margin-bottom: 20px;
}

.search-box svg {
  width: 18px;
  height: 18px;
  opacity: 0.5;
}

.search {
  border: none;
  outline: none;
  padding: 10px;
  font-size: 16px;
  flex: 1;
  background: transparent;
}

/* CARD */
.card {
  background: white;
  border-radius: 16px;
  padding: 15px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
}

/* ADD BUTTON (روی تب بار) */
.add-btn {
  position: fixed;
  bottom: 70px;
  right: 25px;
  background: #007aff;
  color: white;
  border-radius: 50%;
  width: 65px;
  height: 65px;
  font-size: 34px;
  border: none;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

/* TAB BAR */
.tabbar {
  position: fixed;
  bottom: 15px;
  left: 5%;
  width: 90%;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(20px);
  border-radius: 30px;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}

/* TAB ITEM */
.tab {
  text-align: center;
  font-size: 11px;
}

.tab svg {
  display: block;
  margin: 0 auto 4px;
  width: 20px;
  height: 20px;
  opacity: 0.7;
}

/* NO FOLDER پایین */
.no-folder {
  margin-top: 200px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="container">
  <h1>My Vault</h1>

  <!-- SEARCH -->
  <div class="search-box">
    <!-- minimal icon -->
    <svg viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="7" stroke="black" stroke-width="2" fill="none"/>
      <line x1="16" y1="16" x2="22" y2="22" stroke="black" stroke-width="2"/>
    </svg>
    <input class="search" id="search" placeholder="Search" oninput="render()">
  </div>

  <div id="folders"></div>

  <!-- NO FOLDER -->
  <div class="no-folder">
    <h3>No Folder</h3>
  </div>
</div>

<button class="add-btn" onclick="addFolder()">+</button>

<!-- TAB BAR -->
<div class="tabbar">

  <div class="tab">
    <!-- vault -->
    <svg viewBox="0 0 24 24">
      <rect x="3" y="7" width="18" height="14" rx="2" stroke="black" fill="none"/>
      <circle cx="12" cy="14" r="2" stroke="black" fill="none"/>
    </svg>
    My vault
  </div>

  <div class="tab">
    <!-- tree -->
    <svg viewBox="0 0 24 24">
      <circle cx="12" cy="8" r="4" stroke="black" fill="none"/>
      <line x1="12" y1="12" x2="12" y2="20" stroke="black"/>
    </svg>
    Tree
  </div>

  <div class="tab">
    <!-- generator (spark) -->
    <svg viewBox="0 0 24 24">
      <polygon points="12,2 14,10 22,12 14,14 12,22 10,14 2,12 10,10" stroke="black" fill="none"/>
    </svg>
    Generator
  </div>

  <div class="tab">
    <!-- settings -->
    <svg viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="3" stroke="black" fill="none"/>
      <path d="M4 12h2M18 12h2M12 4v2M12 18v2" stroke="black"/>
    </svg>
    Settings
  </div>

</div>

<script>
let folders = JSON.parse(localStorage.getItem("folders")) || [];

function render() {
  let container = document.getElementById("folders");
  let searchValue = document.getElementById("search").value.toLowerCase();

  container.innerHTML = "";

  folders
    .filter(f => f.toLowerCase().includes(searchValue))
    .forEach((f, i) => {
      let div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        ${f}
        <button onclick="deleteFolder(${i})">❌</button>
      `;
      container.appendChild(div);
    });
}

function addFolder() {
  let name = prompt("Folder name:");
  if (name) {
    folders.push(name);
    localStorage.setItem("folders", JSON.stringify(folders));
    render();
  }
}

function deleteFolder(i) {
  folders.splice(i, 1);
  localStorage.setItem("folders", JSON.stringify(folders));
  render();
}

render();
</script>

</body>
</html>
