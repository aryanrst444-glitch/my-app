<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #eef1f5;
}

/* HEADER */
.header {
  padding: 20px;
  font-size: 24px;
  font-weight: bold;
}

/* SEARCH */
.search {
  margin: 0 20px 15px;
}

.search input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: #e5e7eb;
}

/* SECTION */
.section {
  margin: 0 20px 20px;
}

.section-title {
  font-size: 13px;
  font-weight: 600;
  color: #7a7a7a;
  margin-bottom: 8px;
}

/* BOX */
.box {
  background: white;
  border-radius: 18px;
  overflow: hidden;
}

/* ROW */
.row {
  padding: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.row:not(:last-child) {
  border-bottom: 1px solid #eee;
}

.count {
  color: #999;
}

/* ADD BUTTON */
.add-btn {
  position: fixed;
  right: 22px;
  bottom: 90px;
  width: 56px;
  height: 56px;
  background: #1d4ed8;
  color: white;
  border-radius: 50%;
  font-size: 30px;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* TAB BAR */
.tabbar {
  position: fixed;
  bottom: 20px;
  left: 20px;
  right: 20px;
  height: 65px;
  background: white;
  border-radius: 20px;
  display: flex;
  justify-content: space-around;
  align-items: center;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.tab {
  text-align: center;
  font-size: 12px;
  color: #777;
}

.tab.active {
  color: #1d4ed8;
}
</style>
</head>

<body>

<div class="header">My vault</div>

<div class="search">
  <input placeholder="Search">
</div>

<div class="section">
  <div class="section-title">
    Folders (<span id="folderCount">0</span>)
  </div>
  <div class="box" id="folders"></div>
</div>

<div class="section">
  <div class="section-title">No Folder</div>
  <div class="box" id="noFolder"></div>
</div>

<div class="add-btn" onclick="addFolder()">+</div>

<div class="tabbar">
  <div class="tab active">Vault</div>
  <div class="tab">Tree</div>
  <div class="tab">Generator</div>
  <div class="tab">Settings</div>
</div>

<script>
let folders = JSON.parse(localStorage.getItem("folders")) || [];
let dataStore = JSON.parse(localStorage.getItem("dataStore")) || {};

function render() {
  let folderBox = document.getElementById("folders");
  let noFolderBox = document.getElementById("noFolder");

  folderBox.innerHTML = "";
  noFolderBox.innerHTML = "";

  document.getElementById("folderCount").innerText = folders.length;

  folders.forEach(name => {
    let count = (dataStore[name] || []).length;

    let row = document.createElement("div");
    row.className = "row";
    row.onclick = () => openFolder(name);

    row.innerHTML = `
      <span>${name}</span>
      <span class="count">${count}</span>
    `;

    folderBox.appendChild(row);
  });

  let noData = dataStore["noFolder"] || [];

  noData.forEach(item => {
    let row = document.createElement("div");
    row.className = "row";

    row.innerHTML = `
      <span>${item.username || "Item"}</span>
      <span class="count">•</span>
    `;

    noFolderBox.appendChild(row);
  });

  localStorage.setItem("folders", JSON.stringify(folders));
  localStorage.setItem("dataStore", JSON.stringify(dataStore));
}

function addFolder() {
  let name = prompt("Folder name:");
  if (name) {
    folders.push(name);
    dataStore[name] = [];
    render();
  }
}

function openFolder(name) {
  let username = prompt("Username:");
  let password = prompt("Password:");

  if (!dataStore[name]) dataStore[name] = [];

  dataStore[name].push({ username, password });

  render();
}

render();
</script>

</body>
</html>
