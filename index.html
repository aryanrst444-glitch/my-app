<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Vault</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont;
  background: #f2f4f7;
  margin: 0;
}

.container {
  padding: 20px;
}

h1 {
  margin-bottom: 15px;
}

.search {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  margin-bottom: 20px;
}

.section {
  margin-bottom: 20px;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 15px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
}

.add-btn {
  position: fixed;
  bottom: 90px;
  right: 20px;
  background: #007aff;
  color: white;
  border-radius: 50%;
  width: 55px;
  height: 55px;
  font-size: 30px;
  border: none;
}

.tabbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
  border-top: 1px solid #ddd;
}

.tab {
  font-size: 12px;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">
  <h1>My Vault</h1>

  <input class="search" placeholder="Search">

  <!-- Folder Section -->
  <div class="section">
    <h3>Folders</h3>
    <div id="folders"></div>
  </div>

  <!-- No Folder -->
  <div class="section">
    <h3>No Folder</h3>
    <div id="noFolder"> (Empty) </div>
  </div>
</div>

<button class="add-btn" onclick="addFolder()">+</button>

<div class="tabbar">
  <div class="tab">My vault</div>
  <div class="tab">Tree</div>
  <div class="tab">Generator</div>
  <div class="tab">Settings</div>
</div>

<script>
let folders = JSON.parse(localStorage.getItem("folders")) || [];

function render() {
  let container = document.getElementById("folders");
  container.innerHTML = "";

  folders.forEach((f, i) => {
    let div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      ${f}
      <button onclick="deleteFolder(${i})">❌</button>
    `;
    container.appendChild(div);
  });

  localStorage.setItem("folders", JSON.stringify(folders));
}

function addFolder() {
  let name = prompt("Folder name:");
  if (name) {
    folders.push(name);
    render();
  }
}

function deleteFolder(i) {
  folders.splice(i, 1);
  render();
}

render();
</script>

</body>
</html>
