<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Vault</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont;
  background: #f2f4f7;
  margin: 0;
  overflow-x: hidden; /* فیکس حرکت چپ راست */
}

.container {
  padding: 20px;
}

h1 {
  margin-bottom: 15px;
}

/* 🔍 SEARCH BAR */
.search-box {
  display: flex;
  align-items: center;
  background: white;
  border-radius: 16px;
  padding: 10px 15px;
  width: 90%;
  margin-bottom: 20px;
}

.search-box span {
  font-size: 18px;
  margin-right: 8px;
}

.search {
  border: none;
  outline: none;
  font-size: 18px;
  width: 100%;
}

/* SECTIONS */
.section {
  margin-bottom: 20px;
}

.card {
  background: white;
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ➕ BUTTON */
.add-btn {
  position: fixed;
  bottom: 120px;
  right: 20px;
  background: #007aff;
  color: white;
  border-radius: 50%;
  width: 70px;
  height: 70px;
  font-size: 36px;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ✨ LIQUID TAB BAR */
.tabbar {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(20px);
  border-radius: 30px;
  display: flex;
  justify-content: space-around;
  padding: 12px 0;
  box-shadow: 0 8px 30px rgba(0,0,0,0.1);
}

.tab {
  font-size: 13px;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">
  <h1>My Vault</h1>

  <!-- 🔍 SEARCH -->
  <div class="search-box">
    <span>🔍</span>
    <input class="search" id="search" placeholder="Search" oninput="render()">
  </div>

  <!-- Folder Section -->
  <div class="section">
    <h3>Folders</h3>
    <div id="folders"></div>
  </div>

  <!-- No Folder -->
  <div class="section">
    <h3>No Folder</h3>
    <div id="noFolder">(Empty)</div>
  </div>
</div>

<button class="add-btn" onclick="addFolder()">+</button>

<div class="tabbar">
  <div class="tab">My vault</div>
  <div class="tab">Tree</div>
  <div class="tab">Generator</div>
  <div class="tab">Settings</div>
</div>

<script>
let folders = JSON.parse(localStorage.getItem("folders")) || [];

/* 🔍 SEARCH FILTER */
function render() {
  let container = document.getElementById("folders");
  let searchValue = document.getElementById("search").value.toLowerCase();

  container.innerHTML = "";

  let filtered = folders
    .map(name => ({
      name,
      score: similarity(name.toLowerCase(), searchValue)
    }))
    .sort((a,b) => b.score - a.score)
    .filter(f => f.name.toLowerCase().includes(searchValue));

  filtered.forEach((f, i) => {
    let div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <span onclick="openFolder('${f.name}')">${f.name}</span>
      <button onclick="deleteFolder(${folders.indexOf(f.name)})">❌</button>
    `;
    container.appendChild(div);
  });

  localStorage.setItem("folders", JSON.stringify(folders));
}

/* ✨ SIMPLE MATCH SCORE */
function similarity(a, b) {
  let score = 0;
  for (let i = 0; i < b.length; i++) {
    if (a.includes(b[i])) score++;
  }
  return score;
}

/* ➕ ADD */
function addFolder() {
  let name = prompt("Folder name:");
  if (name) {
    folders.push(name);
    render();
  }
}

/* ❌ DELETE */
function deleteFolder(i) {
  folders.splice(i, 1);
  render();
}

/* 📂 OPEN */
function openFolder(name) {
  alert("داخل فولدر: " + name + "\n(مرحله بعدی: ساخت صفحه داخل فولدر)");
}

render();
</script>

</body>
</html>
